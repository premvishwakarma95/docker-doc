version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskmanager-net

  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - taskmanager-net

  backend:
    build: ./backend
    container_name: taskmanager-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskmanager
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis
    networks:
      - taskmanager-net

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - taskmanager-net

volumes:
  mongo-data:

networks:
  taskmanager-net:
    driver: bridge
